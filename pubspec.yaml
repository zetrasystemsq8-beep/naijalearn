name: nigergram
description: "NigerGram - Nigeria's Video Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.8.1
  get_it: ^8.0.3
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  fpdart: ^1.1.0
  json_annotation: ^4.9.0
  lucide_icons_flutter: ^2.0.3
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_storage: ^12.4.4
  image_picker: ^1.1.2
  supabase_flutter: ^2.8.4
  cloud_firestore: ^5.6.6
  video_player: ^2.9.5
  flutter_cache_manager: ^3.4.1
  preload_page_view: ^0.2.0
  cupertino_icons: ^1.0.8
  video_compress: ^3.1.2
  path_provider: ^2.0.14
  http: ^1.2.2
  url_launcher: ^6.1.10
  
  # Structural Additions (Aligned versions to resolve the web package conflict)
  cached_network_image: ^3.4.1
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  very_good_analysis: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
