name: Zetra Storage & Artifact Cleanup

on:
  workflow_run:
    workflows: ["Flutter CI Engine"] # Replace this with the exact name of your main build workflow if different
    types:
      - completed

permissions:
  actions: write
  contents: read

jobs:
  clean-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Old Compilation Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Fetching active artifacts for ${owner}/${repo}...`);
            
            const response = await github.rest.actions.listArtifactsForRepo({
              owner: owner,
              repo: repo,
              per_page: 100
            });
            
            const artifacts = response.data.artifacts;
            console.log(`Found ${artifacts.length} total artifacts.`);
            
            if (artifacts.length === 0) {
              console.log("Storage is already clear.");
              return;
            }

            // Loop through and delete every single stored artifact to instantly drop storage usage to zero
            for (const artifact of artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: owner,
                  repo: repo,
                  artifact_id: artifact.id,
                });
                console.log(`Successfully purged ${artifact.name}`);
              } catch (error) {
                console.log(`Failed to delete ${artifact.name}: ${error.message}`);
              }
            }
            console.log("Storage optimization complete.");
